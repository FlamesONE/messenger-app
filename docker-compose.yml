services:
  # ─── PG Migrations (init) ──────────────────────────────
  migrate:
    build: ./backend
    command: ["bunx", "drizzle-kit", "migrate"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-messenger}:${POSTGRES_PASSWORD:-messenger_secret}@postgres:5432/${POSTGRES_DB:-messenger}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Backend ──────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-messenger}:${POSTGRES_PASSWORD:-messenger_secret}@postgres:5432/${POSTGRES_DB:-messenger}
      REDIS_URL: redis://redis:6379
      SCYLLA_CONTACT_POINTS: scylla:9042
      S3_ENDPOINT: http://minio:9000
      MEILISEARCH_URL: http://meilisearch:7700
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scylla:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-messenger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-messenger_secret}
      POSTGRES_DB: ${POSTGRES_DB:-messenger}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-messenger}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── ScyllaDB ────────────────────────────────────────
  scylla:
    image: scylladb/scylla:2025.1
    command: --smp 1 --memory 512M --overprovisioned 1
    ports:
      - "${SCYLLA_PORT:-9042}:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── MeiliSearch ─────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.37
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_ENV: development
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

  # ─── MinIO (S3-compatible) ───────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── MinIO bucket init ──────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/$${S3_BUCKET:-messenger-uploads};
      exit 0;
      "

volumes:
  pg_data:
  scylla_data:
  redis_data:
  meili_data:
  minio_data:
