name: Auto Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".github/workflows/auto-release.yml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current
        run: |
          VERSION=$(jq -r '.version' frontend/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Determine version bump
        id: bump
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline --format="%s")
          fi

          echo "Commits since last release:"
          echo "$COMMITS"

          # Skip if no new commits
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "BREAKING[ -]CHANGE|^[a-z]+(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Calculate new version
        if: steps.bump.outputs.skip != 'true'
        id: version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.bump }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update version in files
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"

          # Update tauri.conf.json
          jq --arg v "$NEW_VERSION" '.version = $v' frontend/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json frontend/src-tauri/tauri.conf.json

          # Update frontend package.json
          jq --arg v "$NEW_VERSION" '.version = $v' frontend/package.json > tmp.json
          mv tmp.json frontend/package.json

          # Update backend package.json
          jq --arg v "$NEW_VERSION" '.version = $v' backend/package.json > tmp.json
          mv tmp.json backend/package.json

          # Update Cargo.toml version
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" frontend/src-tauri/Cargo.toml

      - name: Commit and tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "release: v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags
