name: Build Desktop & Mobile

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Парсинг версии из commit message, bump файлов, создание тега ──
  tag-release:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Check commit message for version
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in project files
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" \
            frontend/package.json \
            frontend/src-tauri/tauri.conf.json \
            backend/package.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" \
            frontend/src-tauri/Cargo.toml

      - name: Commit version bump & create tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: bump version to $VERSION"
          git tag "v$VERSION"
          git push origin HEAD "v$VERSION"

  # ─── Desktop builds ────────────────────────────────────
  build-desktop:
    needs: [tag-release]
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/v')
        || needs.tag-release.outputs.should_release == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag-release.outputs.version && format('v{0}', needs.tag-release.outputs.version) || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
          shared-key: tauri-${{ matrix.label }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ matrix.platform }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ matrix.platform }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        working-directory: frontend
        run: bunx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fasty-${{ matrix.label }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz

  # ─── Android build ─────────────────────────────────────
  build-android:
    needs: [tag-release]
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/v')
        || needs.tag-release.outputs.should_release == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag-release.outputs.version && format('v{0}', needs.tag-release.outputs.version) || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
          shared-key: tauri-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-ubuntu-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-ubuntu-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/src-tauri/gen/android/**/*.gradle*', 'frontend/src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Initialize Android project
        working-directory: frontend
        run: bunx tauri android init
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Setup Android signing
        if: ${{ env.HAS_ANDROID_KEY == 'true' }}
        run: |
          cd frontend/src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties
        env:
          HAS_ANDROID_KEY: ${{ secrets.ANDROID_KEY_BASE64 != '' }}

      - name: Patch build.gradle.kts for release signing
        if: ${{ env.HAS_ANDROID_KEY == 'true' }}
        run: |
          GRADLE_FILE="frontend/src-tauri/gen/android/app/build.gradle.kts"

          # Add imports at the top of the file
          sed -i '1i import java.util.Properties\nimport java.io.FileInputStream' "$GRADLE_FILE"

          # Insert signingConfigs block before buildTypes
          sed -i '/buildTypes {/i \
              signingConfigs {\
                  create("release") {\
                      val keystorePropertiesFile = rootProject.file("keystore.properties")\
                      val keystoreProperties = Properties()\
                      if (keystorePropertiesFile.exists()) {\
                          keystoreProperties.load(FileInputStream(keystorePropertiesFile))\
                      }\
                      keyAlias = keystoreProperties["keyAlias"].toString()\
                      keyPassword = keystoreProperties["password"].toString()\
                      storeFile = file(keystoreProperties["storeFile"].toString())\
                      storePassword = keystoreProperties["password"].toString()\
                  }\
              }' "$GRADLE_FILE"

          # Add signingConfig to release buildType
          sed -i 's/getByName("release") {/getByName("release") {\n                signingConfig = signingConfigs.getByName("release")/' "$GRADLE_FILE"
        env:
          HAS_ANDROID_KEY: ${{ secrets.ANDROID_KEY_BASE64 != '' }}

      - name: Build APK (arm64)
        working-directory: frontend
        run: bunx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fasty-android-apk
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ─── GitHub Release ────────────────────────────────────
  create-release:
    needs: [tag-release, build-desktop, build-android]
    if: always() && needs.build-desktop.result == 'success' && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-release.outputs.version && format('v{0}', needs.tag-release.outputs.version) || github.ref_name }}
          draft: false
          generate_release_notes: true
          files: artifacts/**/*

          